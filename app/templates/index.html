<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e293b">
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/static/favicon.svg">
<title>Clash Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root[data-theme="light"] {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --input-bg: #f8fafc;
    --nav-hover: #e2e8f0;
    --nav-active: #3b82f6;
    --shadow: 0 4px 24px rgba(15,23,42,.08);
    --modal-bg: rgba(15,23,42,.45);
    --yaml-bg: #0f172a;
    --yaml-text: #e2e8f0;
    --yaml-gutter: #475569;
    --yaml-k: #4ade80;
    --yaml-p: #94a3b8;
    --yaml-str: #fbbf24;
    --yaml-num: #38bdf8;
    --yaml-comment: #64748b;
  }
  :root[data-theme="dark"] {
    --bg: #0f172a;
    --surface: #1e293b;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #334155;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --danger: #f87171;
    --danger-bg: rgba(239,68,68,.15);
    --input-bg: #0f172a;
    --nav-hover: #334155;
    --nav-active: #2563eb;
    --shadow: 0 4px 24px rgba(0,0,0,.35);
    --modal-bg: rgba(0,0,0,.6);
    --yaml-bg: #020617;
    --yaml-text: #e2e8f0;
    --yaml-gutter: #475569;
    --yaml-k: #4ade80;
    --yaml-p: #94a3b8;
    --yaml-str: #fbbf24;
    --yaml-num: #38bdf8;
    --yaml-comment: #64748b;
  }
  body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
  .card{background:var(--card);border-radius:.75rem;border:1px solid var(--border);padding:1.5rem;box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s}
  .card:hover{box-shadow:0 8px 32px rgba(0,0,0,.12)}
  .btn{padding:.5rem 1rem;border-radius:.5rem;font-weight:500;cursor:pointer;transition:transform .1s,background .15s,opacity .15s;border:none}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
  .btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
  .btn-secondary{background:var(--muted);color:#fff}.btn-secondary:hover{opacity:.9}
  .btn-outline-danger{background:transparent;color:var(--danger);border:2px solid var(--danger)}
  .btn-outline-danger:hover{background:var(--danger-bg)}
  .btn-accent-orange{background:#ea580c;color:#fff}.btn-accent-orange:hover{background:#c2410c}
  .btn-refresh{background:#16a34a;color:#fff}.btn-refresh:hover{background:#15803d}
  .btn-sm{padding:.25rem .75rem;font-size:.875rem}
  input:not([type=checkbox]):not([type=radio]):not([type=range]),select,textarea{background:var(--input-bg);border:1px solid var(--border);border-radius:.5rem;padding:.65rem .875rem;color:var(--text);width:100%;min-height:2.75rem;line-height:1.45;box-sizing:border-box}
  textarea{min-height:6rem}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.25)}
  .form-check{display:inline-flex;align-items:center;gap:.5rem;cursor:pointer;user-select:none}
  .form-check input[type=checkbox],.form-check input[type=radio]{width:1.05rem;height:1.05rem;min-height:0;flex-shrink:0;margin:0;accent-color:var(--accent)}
  .form-check span{white-space:nowrap;line-height:1.4}
  .progress-bar{height:.5rem;border-radius:.25rem;background:var(--border);overflow:hidden}
  .progress-fill{height:100%;border-radius:.25rem;transition:width .35s ease}
  .nav-item{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;cursor:pointer;border-radius:.5rem;transition:background .15s;color:var(--text)}
  .nav-item:hover{background:var(--nav-hover)}.nav-item.active{background:var(--nav-active);color:#fff}
  .nav-item svg{opacity:.85}
  .modal-bg{position:fixed;inset:0;background:var(--modal-bg);display:flex;align-items:center;justify-content:center;z-index:50}
  .tag{display:inline-block;padding:.125rem .5rem;border-radius:.25rem;font-size:.75rem;font-weight:500}
  .toast{position:fixed;top:1rem;right:1rem;z-index:100;padding:.75rem 1.25rem;border-radius:.5rem;font-weight:500;animation:slidein .3s}
  @keyframes slidein{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  .sub-switch{position:relative;display:inline-block;width:2.75rem;height:1.5rem;flex-shrink:0;vertical-align:middle}
  .sub-switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;z-index:2}
  .sub-switch-slider{position:absolute;inset:0;background:var(--muted);border-radius:9999px;transition:background .2s ease;pointer-events:none;z-index:1}
  .sub-switch-slider::before{content:"";position:absolute;width:1.125rem;height:1.125rem;left:.1875rem;top:50%;transform:translateY(-50%);background:#f1f5f9;border-radius:50%;transition:transform .2s ease;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .sub-switch input:checked + .sub-switch-slider{background:#16a34a}
  .sub-switch input:checked + .sub-switch-slider::before{transform:translate(1.25rem,-50%)}
  .sub-switch input:focus-visible + .sub-switch-slider{box-shadow:0 0 0 2px var(--card),0 0 0 4px var(--accent)}
  .home-tab{border-bottom:2px solid transparent;color:var(--muted);padding:.5rem .75rem;cursor:pointer;transition:color .15s,border-color .15s}
  .home-tab.active{color:#ea580c;border-bottom-color:#ea580c;font-weight:600}
  .client-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid var(--border)}
  .client-row:last-child{border-bottom:none}
  .preset-row-config{cursor:pointer;border-radius:.5rem;border:2px solid var(--border);padding:.75rem 1rem;margin-bottom:.5rem;transition:border-color .15s,box-shadow .15s}
  .preset-row-config:hover{border-color:var(--accent)}
  .preset-row-config.is-active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  /* 仅此容器滚动：行号与正文同一滚动上下文，滚轮时同步移动 */
  .yaml-viewer{display:flex;flex-direction:row;align-items:flex-start;font-family:ui-monospace,monospace;font-size:.75rem;line-height:1.5;min-height:min(50vh,480px);flex:1 1 auto;min-width:0;background:var(--yaml-bg);color:var(--yaml-text);border-radius:.5rem;overflow:auto;border:1px solid var(--border)}
  /* 须保留换行：否则行号里的 \\n 会被折叠成空格 */
  .yaml-gutter{flex:0 0 auto;padding:.75rem .5rem .75rem .75rem;text-align:right;color:var(--yaml-gutter);user-select:none;border-right:1px solid var(--border);white-space:pre;min-width:2.5rem}
  /* 不设 overflow：宽度随最长行伸展，由 .yaml-viewer 统一横向/纵向滚动 */
  .yaml-code{flex:0 0 auto;margin:0;padding:.75rem;overflow:visible;white-space:pre;color:inherit;max-width:none}
  .yaml-code code{display:block;font-family:inherit;font-size:inherit;color:inherit;white-space:pre}
  .yaml-k{color:var(--yaml-k)}.yaml-p{color:var(--yaml-p)}.yaml-str{color:var(--yaml-str)}.yaml-num{color:var(--yaml-num)}.yaml-comment{color:var(--yaml-comment)}
  .preview-toggle{display:inline-flex;border-radius:.5rem;overflow:hidden;border:1px solid var(--border)}
  .preview-toggle button{padding:.35rem .75rem;font-size:.75rem;background:var(--input-bg);color:var(--muted);border:none;cursor:pointer}
  .preview-toggle button.active{background:var(--accent);color:#fff}
  header{border-color:var(--border)!important}
  .border-slate-700{border-color:var(--border)!important}
  .text-slate-400{color:var(--muted)!important}
  .login-deco{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .login-deco::before{content:"";position:absolute;width:60vmax;height:60vmax;left:-20%;top:-20%;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 60%);border-radius:50%}
  @media (max-width:1023px){
    .layout-nav{width:100%;border-right:none;border-bottom:1px solid var(--border);min-height:auto;padding:.5rem 1rem;flex-direction:row;flex-wrap:wrap;gap:.25rem}
    .layout-main{max-height:none!important}
  }
  .app-logo{width:2.5rem;height:2.5rem;border-radius:.65rem;flex-shrink:0;object-fit:contain}
  .app-logo-sm{width:2rem;height:2rem;border-radius:.5rem}
</style>
</head>
<body>
<div id="app">
  <div id="loginPage" class="relative flex items-center justify-center min-h-screen p-4">
    <div class="login-deco"></div>
    <div class="card w-full max-w-sm text-center relative z-10">
      <img src="/static/favicon.svg" alt="" width="56" height="56" class="app-logo mx-auto mb-3 shadow-lg" decoding="async">
      <h1 class="text-2xl font-bold mb-1">Clash Hub</h1>
      <p class="text-slate-400 mb-6 text-sm">订阅聚合管理</p>
      <input id="pwdInput" type="password" placeholder="管理密码" class="mb-4" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn btn-primary w-full" onclick="doLogin()">登 录</button>
      <p id="loginErr" class="text-red-400 text-sm mt-3 hidden"></p>
    </div>
  </div>

  <div id="mainPage" class="hidden">
    <header class="border-b px-4 md:px-6 py-3 flex flex-wrap items-center justify-between gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <img src="/static/favicon.svg" alt="" width="32" height="32" class="app-logo-sm" decoding="async">
        <h1 class="text-lg font-bold truncate">Clash Hub</h1>
      </div>
      <div class="flex items-center gap-2 md:gap-3">
        <button type="button" class="btn btn-secondary btn-sm p-2" title="切换主题" onclick="toggleTheme()" id="themeBtn" aria-label="切换主题">
          <svg id="iconSun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="iconMoon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <button class="btn btn-secondary btn-sm" onclick="doLogout()">退出</button>
      </div>
    </header>
    <div class="flex flex-col lg:flex-row">
      <nav class="layout-nav w-full lg:w-52 lg:border-r lg:border-slate-700 p-2 lg:p-4 lg:min-h-[calc(100vh-52px)] flex flex-col gap-1">
        <div class="nav-item active" data-page="home" onclick="switchPage('home',this)">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          首页
        </div>
        <div class="nav-item" data-page="subs" onclick="switchPage('subs',this)">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          订阅管理
        </div>
        <div class="nav-item" data-page="config" onclick="switchPage('config',this)">
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          配置
        </div>
      </nav>
      <main class="layout-main flex-1 p-4 md:p-6 overflow-auto lg:max-h-[calc(100vh-52px)]">
        <div id="page-home">
          <h2 class="text-xl font-bold mb-4">概览</h2>
          <div id="homeTraffic" class="mb-6"></div>
          <div class="card">
            <h3 class="text-lg font-bold mb-1">订阅链接获取</h3>
            <p class="text-sm text-slate-400 mb-4">按设备选择导入方式；泄露后可重置密钥使旧链接失效。</p>
            <div class="flex flex-wrap gap-1 border-b border-slate-700 mb-4" id="homeSubTabs">
              <button type="button" class="home-tab active" data-hometab="ios" onclick="switchHomeSubTab('ios',this)">苹果手机软件</button>
              <button type="button" class="home-tab" data-hometab="android" onclick="switchHomeSubTab('android',this)">安卓手机软件</button>
              <button type="button" class="home-tab" data-hometab="desktop" onclick="switchHomeSubTab('desktop',this)">Windows 和 Mac 电脑</button>
            </div>
            <div id="homeSubPanelIos"></div>
            <div id="homeSubPanelAndroid" class="hidden"></div>
            <div id="homeSubPanelDesktop" class="hidden"></div>
            <div class="flex flex-col sm:flex-row gap-3 mt-6 pt-4 border-t border-slate-700">
              <button type="button" class="btn btn-outline-danger flex-1" onclick="resetSubUuid()">重置密钥</button>
              <button type="button" class="btn btn-accent-orange flex-1" onclick="copyGenericSub()">复制通用订阅链接</button>
            </div>
          </div>
        </div>

        <div id="page-subs" class="hidden">
          <div class="flex items-center justify-between mb-4 flex-wrap gap-2 gap-y-3">
            <div class="flex items-center gap-3 min-w-0 flex-1">
              <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer select-none shrink-0" title="勾选列表中的订阅">
                <input type="checkbox" id="subSelectAll" class="rounded border-slate-500" onchange="toggleSelectAllSubs(this.checked)"> 全选
              </label>
              <h2 class="text-xl font-bold truncate">订阅管理</h2>
            </div>
            <div class="flex flex-wrap gap-2 items-center justify-end">
              <button type="button" class="btn btn-secondary btn-sm" onclick="batchEnableSubs(true)">批量启用</button>
              <button type="button" class="btn btn-secondary btn-sm" onclick="batchEnableSubs(false)">批量禁用</button>
              <button type="button" class="btn btn-danger btn-sm" onclick="batchDeleteSubs()" title="删除已勾选的订阅">批量删除</button>
              <button type="button" class="btn btn-accent-orange btn-sm" onclick="batchCheckSubs()" title="仅检测列表已勾选的订阅；不可用且原为启用的将自动禁用">批量检测</button>
              <button type="button" class="btn btn-refresh btn-sm" onclick="refreshAllSubs()">全部刷新</button>
              <button type="button" class="btn btn-secondary btn-sm" onclick="showBatchImportSubs()" title="多行分享链接，每条生成一条订阅">批量导入</button>
              <button class="btn btn-primary btn-sm" onclick="showAddSub()">添加订阅</button>
            </div>
          </div>
          <div id="subsList"></div>
        </div>

        <div id="page-config" class="hidden flex flex-col xl:flex-row gap-4 xl:items-stretch xl:min-h-0 min-h-0">
          <div class="flex-1 min-w-0 min-h-0 space-y-4 xl:flex-none xl:w-[42%] xl:max-w-[42%] xl:overflow-y-auto xl:max-h-[calc(100vh-8rem)]">
            <div class="card">
              <div class="flex items-center justify-between mb-3">
                <h3 class="text-lg font-bold">模板</h3>
              </div>
              <p class="text-sm text-slate-400 mb-3">选用预设或自定义模板；右侧实时预览聚合结果。</p>
              <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">预设</h4>
              <div id="configPresetList"></div>
              <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2 mt-4">自定义</h4>
              <button type="button" class="btn btn-primary btn-sm mb-2" onclick="showTplItemModal(null)">创建模板</button>
              <div id="configCustomTplList" class="space-y-2"></div>
            </div>
            <div class="card space-y-4">
              <h3 class="text-lg font-bold">过滤与行为</h3>
              <div><label class="text-sm text-slate-400">协议白名单 (逗号分隔, 留空表示不限)</label>
                <input id="s_include" placeholder="如: ss,trojan,hysteria2"></div>
              <div><label class="text-sm text-slate-400">协议黑名单 (逗号分隔)</label>
                <input id="s_exclude" placeholder="如: ssr,snell"></div>
              <div><label class="text-sm text-slate-400">排除关键词 (逗号分隔)</label>
                <input id="s_keywords" placeholder="剩余流量,官网,重置"></div>
              <div><label class="text-sm text-slate-400">抓取超时 (秒)</label>
                <input id="s_timeout" type="number" value="15"></div>
              <div><label class="text-sm text-slate-400">Mihomo 可执行文件路径（可选）</label>
                <input id="s_mihomo" class="font-mono text-sm" placeholder="如 mihomo 或 C:\Tools\mihomo.exe；用于 SS/VMess/VLESS/Trojan/Hy2 单节点 URL 延迟检测"></div>
              <div class="flex flex-col gap-3 sm:flex-row sm:flex-wrap sm:items-center sm:gap-x-8 sm:gap-y-2">
                <label class="form-check"><input type="checkbox" id="s_autoExpiry"><span>到期自动禁用</span></label>
                <label class="form-check"><input type="checkbox" id="s_autoEmpty"><span>流量耗尽自动禁用</span></label>
              </div>
              <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
            </div>
          </div>
          <div class="flex-1 min-w-0 min-h-0 flex flex-col card p-0 overflow-hidden min-h-[min(55vh,520px)] xl:flex-1 xl:min-w-0 xl:max-h-[calc(100vh-8rem)] xl:self-stretch">
            <div class="flex flex-wrap items-center justify-between gap-2 px-4 py-3 border-b border-slate-700 shrink-0">
              <div class="flex items-center gap-2 font-semibold">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                预览
              </div>
              <div class="flex flex-wrap items-center gap-2">
                <span id="previewStats" class="text-xs text-slate-400"></span>
                <div class="preview-toggle">
                  <button type="button" id="pvBtnYaml" class="active" onclick="setPreviewMode('yaml')">YAML</button>
                  <button type="button" id="pvBtnVis" onclick="setPreviewMode('visual')">可视化</button>
                </div>
                <button type="button" class="btn btn-refresh btn-sm" onclick="refreshPreview()">刷新</button>
              </div>
            </div>
            <div id="configPreviewYamlWrap" class="relative flex-1 min-h-0 overflow-hidden p-3 flex flex-col">
              <button type="button" id="btnCopyYaml" class="absolute top-3 z-10 p-2 rounded-lg border shadow-sm opacity-90 hover:opacity-100 transition-opacity" style="right:2.25rem;background:var(--card);border-color:var(--border);color:var(--muted)" title="复制 YAML" aria-label="复制 YAML" onclick="copyPreviewYaml()">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
              </button>
              <div id="configPreviewYaml" class="yaml-viewer"></div>
            </div>
            <div id="configPreviewVisual" class="hidden flex-1 min-h-0 overflow-hidden p-4 gap-4 text-sm flex flex-col md:flex-row"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>

<script>
const API = '';
let TOKEN = localStorage.getItem('token') || '';
let _subsCache = [];
let _previewTimer = null;
let _previewMode = 'yaml';
let _lastPreview = null;

function headers() { return { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' }; }

async function api(path, opts = {}) {
  const res = await fetch(API + path, { headers: headers(), ...opts });
  if (res.status === 401) { doLogout(); throw new Error('未登录'); }
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    let d = e.detail || '请求失败';
    if (Array.isArray(d)) d = d.map(x => (x && x.msg) || String(x)).join('; ');
    throw new Error(typeof d === 'string' ? d : JSON.stringify(d));
  }
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res.text();
}

function toast(msg, type = 'success') {
  const d = document.createElement('div');
  d.className = 'toast ' + (type === 'error' ? 'bg-red-600' : 'bg-green-600');
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

function formatBytes(b) {
  if (!b || b <= 0) return '0 B';
  const u = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(2) + ' ' + u[i];
}

function formatDate(ts) {
  if (!ts || ts <= 0) return '-';
  return new Date(ts * 1000).toLocaleDateString('zh-CN');
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initTheme() {
  const t = localStorage.getItem('ch_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('iconSun').classList.toggle('hidden', t !== 'dark');
  document.getElementById('iconMoon').classList.toggle('hidden', t === 'dark');
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ch_theme', next);
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('iconSun').classList.toggle('hidden', next !== 'dark');
  document.getElementById('iconMoon').classList.toggle('hidden', next === 'dark');
}

initTheme();

async function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  try {
    const r = await fetch(API + '/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (!r.ok) { document.getElementById('loginErr').textContent = '密码错误'; document.getElementById('loginErr').classList.remove('hidden'); return; }
    const d = await r.json();
    TOKEN = d.token;
    localStorage.setItem('token', TOKEN);
    showMain();
  } catch (e) { toast(e.message, 'error'); }
}

function doLogout() {
  TOKEN = '';
  localStorage.removeItem('token');
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
}

async function showMain() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainPage').classList.remove('hidden');
  const navHome = document.querySelector('.nav-item[data-page="home"]');
  switchPage('home', navHome);
}

function switchPage(name, el) {
  document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
  const page = document.getElementById('page-' + name);
  page.classList.remove('hidden');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  if (name === 'home') loadHome();
  if (name === 'subs') loadSubs();
  if (name === 'config') loadConfigPage();
}

function schedulePreviewRefresh() {
  const pc = document.getElementById('page-config');
  if (!pc || pc.classList.contains('hidden')) return;
  clearTimeout(_previewTimer);
  _previewTimer = setTimeout(() => refreshPreview(), 500);
}

async function loadHome() {
  try {
    const t = await api('/api/traffic');
    const pctNum = t.total_total > 0 ? (t.total_used / t.total_total * 100) : 0;
    const pct = pctNum.toFixed(1);
    /* 使用率分段：绿 → 黄绿 → 黄 → 琥珀 → 橙 → 红 */
    const color = pctNum > 92 ? '#dc2626'
      : pctNum > 82 ? '#ef4444'
      : pctNum > 70 ? '#f97316'
      : pctNum > 55 ? '#f59e0b'
      : pctNum > 40 ? '#eab308'
      : pctNum > 25 ? '#84cc16'
      : '#22c55e';
    document.getElementById('homeTraffic').innerHTML = `
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
        <div class="card text-center"><div class="text-2xl font-bold text-green-500">${formatBytes(t.remaining)}</div><div class="text-sm text-slate-400 mt-1">剩余流量</div></div>
        <div class="card text-center"><div class="text-2xl font-bold" style="color:${color}">${formatBytes(t.total_used)}</div><div class="text-sm text-slate-400 mt-1">使用流量</div></div>
        <div class="card text-center"><div class="text-2xl font-bold" style="color:var(--accent)">${formatBytes(t.total_total)}</div><div class="text-sm text-slate-400 mt-1">总流量</div></div>
      </div>
      <div class="card">
        <div class="flex justify-between text-sm mb-2"><span>使用率</span><span>${pct}%</span></div>
        <div class="progress-bar" style="height:.75rem"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="text-sm text-slate-400 mt-3">最早到期: ${t.expire_date || '-'}</div>
      </div>`;
    const s = await api('/api/settings');
    window._subBaseUrl = location.origin + '/sub/' + s.sub_uuid;
    renderHomeClientPanels();
  } catch (e) { toast(e.message, 'error'); }
}

function clashMetaImportUrl() {

function shadowrocketImportUrl() {
  const raw = window._subBaseUrl || '';

    const b = btoa(unescape(encodeURIComponent(raw)));
    return 'sub://' + b;
  } catch (_) {
    return 'sub://' + btoa(raw);
  }
}

async function loadSubs() {
  try {
    const subs = await api('/api/subscriptions');
    _subsCache = subs;
    const el = document.getElementById('subsList');
    if (!subs.length) { el.innerHTML = '<div class="card text-center text-slate-400 py-8">暂无订阅，点击添加订阅</div>'; return; }
    el.innerHTML = subs.map(s => {
      const pct = s.total > 0 ? Math.min(100, (s.used / s.total * 100)).toFixed(1) : 0;
      const color = pct > 90 ? '#ef4444' : pct > 70 ? '#f59e0b' : '#22c55e';
      return `<div class="card mb-3" data-sub-id="${s.id}">
        <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
          <div class="flex items-center gap-2">
            <input type="checkbox" class="sub-cb rounded border-slate-500 shrink-0" data-id="${s.id}" title="勾选后可批量启用/禁用/检测" onclick="event.stopPropagation()" onchange="syncSubSelectAll()">
            <label class="sub-switch mr-1" title="${s.enabled ? '点击禁用' : '点击启用'}">
              <input type="checkbox" role="switch" aria-label="启用订阅" ${s.enabled ? 'checked' : ''} onchange="toggleSubEnabled(${s.id}, this.checked)">
              <span class="sub-switch-slider"></span>
            </label>
            <span class="tag ${s.enabled ? 'bg-green-600/20 text-green-400' : 'bg-red-600/20 text-red-400'}">${s.enabled ? '启用' : '禁用'}</span>
            <span class="font-semibold">${esc(s.name)}</span>
            ${s.prefix ? `<span class="tag bg-blue-600/20 text-blue-400">${esc(s.prefix)}</span>` : ''}
          </div>
          <div class="flex flex-wrap gap-1">
            <button type="button" class="btn btn-accent-orange btn-sm" onclick="checkSub(${s.id})" title="检测：拉取+解析；单节点时额外 TCP 建连延迟">检测</button>
            <button type="button" class="btn btn-refresh btn-sm" onclick="refreshSub(${s.id})">刷新</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="showEditSub(${s.id})">编辑</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSub(${s.id})">删除</button>
          </div>
        </div>
        <div class="flex flex-wrap items-center gap-4 text-sm text-slate-400 mb-2">
          <span>节点: ${s.node_count}</span>
          <span>已用: ${formatBytes(s.used)} / ${formatBytes(s.total)}</span>
          <span>到期: ${formatDate(s.expire)}</span>
          <span>同步: ${s.last_sync ? new Date(s.last_sync).toLocaleString('zh-CN') : '-'}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');
    const sa = document.getElementById('subSelectAll');
    if (sa) { sa.checked = false; sa.indeterminate = false; }
  } catch (e) { toast(e.message, 'error'); }
}

function getSelectedSubIds() {
  return Array.from(document.querySelectorAll('#subsList .sub-cb:checked')).map(cb => parseInt(cb.getAttribute('data-id'), 10)).filter(n => !isNaN(n));
}

function toggleSelectAllSubs(checked) {
  document.querySelectorAll('#subsList .sub-cb').forEach(cb => { cb.checked = checked; });
  const sa = document.getElementById('subSelectAll');
  if (sa) sa.indeterminate = false;
}

function syncSubSelectAll() {
  const boxes = Array.from(document.querySelectorAll('#subsList .sub-cb'));
  if (!boxes.length) return;
  const n = boxes.length;
  const c = boxes.filter(b => b.checked).length;
  const sa = document.getElementById('subSelectAll');
  if (!sa) return;
  sa.checked = c === n;
  sa.indeterminate = c > 0 && c < n;
}

async function batchEnableSubs(enabled) {
  const ids = getSelectedSubIds();
  if (!ids.length) { toast('请先勾选要操作的订阅', 'error'); return; }
  try {
    await api('/api/subscriptions/batch-enabled', { method: 'POST', body: JSON.stringify({ ids, enabled }) });
    toast(enabled ? '已批量启用' : '已批量禁用');
    await loadSubs();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

async function batchDeleteSubs() {
  const ids = getSelectedSubIds();
  if (!ids.length) { toast('请先勾选要删除的订阅', 'error'); return; }
  if (!confirm('将永久删除选中的 ' + ids.length + ' 条订阅，不可恢复。确定？')) return;
  try {
    const r = await api('/api/subscriptions/batch-delete', { method: 'POST', body: JSON.stringify({ ids }) });
    toast('已删除 ' + (r.deleted || ids.length) + ' 条');
    await loadSubs();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

async function submitBatchImportSubs() {
  const name = (document.getElementById('batch_sub_name')?.value || '').trim();
  const text = document.getElementById('batch_uri_text')?.value || '';
  if (!name) { toast('请填写名称', 'error'); return; }
  if (!text.trim()) { toast('请粘贴至少一行分享链接', 'error'); return; }
  try {
    toast('正在导入…');
    const r = await api('/api/subscriptions/batch-import', {
      method: 'POST',
      body: JSON.stringify({ name, text }),
    });
    document.getElementById('batchImportModal')?.remove();
    let msg = '已导入 ' + (r.created || 0) + ' 条订阅';
    if (r.skipped) msg += '，跳过 ' + r.skipped + ' 行无效链接';
    toast(msg);
    await loadSubs();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

function showEditSub(id) {
  const sub = _subsCache.find(x => x.id === id);
  if (!sub) { toast('未找到该订阅，请刷新列表后重试', 'error'); loadSubs(); return; }
  showSubModal(sub);
}

function showSubModal(sub = null) {
  const isEdit = !!sub;
  const html = `<div class="modal-bg" id="subModal" onclick="if(event.target===this)this.remove()">
    <div class="card w-full max-w-md max-h-[90vh] overflow-y-auto">
      <h3 class="text-lg font-bold mb-4">${isEdit ? '编辑' : '添加'}订阅</h3>
      <div class="space-y-3">
        <div><label class="text-sm text-slate-400">名称</label><input id="m_name" value="${esc(sub?.name || '')}"></div>
        <div><label class="text-sm text-slate-400">订阅链接或单节点</label><input id="m_url" value="${esc(sub?.url || '')}" placeholder="https://... 或 ss:// / ssr:// / vmess:// / vless:// / trojan:// / hysteria2://"></div>
        <div><label class="text-sm text-slate-400">前缀</label><input id="m_prefix" value="${esc(sub?.prefix || '')}" placeholder="可选, 用于区分来源"></div>
        <div class="flex items-center gap-4">
          <label class="flex items-center gap-2"><input type="checkbox" id="m_enabled" ${!sub || sub.enabled ? 'checked' : ''}> 启用</label>
          <label class="flex items-center gap-2"><input type="checkbox" id="m_autodis" ${!sub || sub.auto_disable ? 'checked' : ''}> 自动禁用</label>
        </div>
        <div class="flex gap-2 justify-end">
          <button class="btn btn-secondary" onclick="document.getElementById('subModal').remove()">取消</button>
          <button class="btn btn-primary" onclick="saveSub(${sub ? sub.id : 'null'})">${isEdit ? '保存' : '添加'}</button>
        </div>

async function saveSub(id) {
  const data = {
    name: document.getElementById('m_name').value,
    url: document.getElementById('m_url').value,
    prefix: document.getElementById('m_prefix').value,
    enabled: document.getElementById('m_enabled').checked,
    auto_disable: document.getElementById('m_autodis').checked,
  };
  if (!data.name || !data.url) { toast('名称和URL不能为空', 'error'); return; }
  try {
    if (id) {
      await api('/api/subscriptions/' + id, { method: 'PUT', body: JSON.stringify(data) });
    } else {
      await api('/api/subscriptions', { method: 'POST', body: JSON.stringify(data) });
    }
    document.getElementById('subModal')?.remove();
    toast(id ? '已更新' : '已添加');
    await loadSubs();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteSub(id) {
  if (!confirm('确定删除？')) return;
  try { await api('/api/subscriptions/' + id, { method: 'DELETE' }); toast('已删除'); await loadSubs(); schedulePreviewRefresh(); }
  catch (e) { toast(e.message, 'error'); }
}

async function refreshSub(id) {
  try { await api('/api/subscriptions/' + id + '/refresh', { method: 'POST' }); toast('刷新成功'); await loadSubs(); schedulePreviewRefresh(); }
  catch (e) { toast(e.message, 'error'); }
}

async function refreshAllSubs() {
  try { toast('正在刷新所有订阅...'); await api('/api/subscriptions/refresh-all', { method: 'POST' }); toast('全部刷新完成'); await loadSubs(); schedulePreviewRefresh(); }
  catch (e) { toast(e.message, 'error'); }
}

/** 单条：只检测并提示，不自动改启用状态 */
async function checkSub(id) {
  try {
    toast('正在检测…');
    const r = await api('/api/subscriptions/' + id + '/check', { method: 'POST', body: '{}' });
    const state = r.enabled ? '当前：启用' : '当前：禁用';
    const head = r.available ? '检测通过（可用）' : '检测未通过（不可用）';
    let tcpLine = '';
    const pk = r.probe_kind || '';
    if (r.latency_ms != null)
      tcpLine = '\n延迟（' + (pk === 'httpx' ? '经代理 URL' : pk === 'mihomo' ? 'Mihomo URL' : pk === 'tcp-fallback' ? 'TCP 兜底' : '探测') + '）: ' + Math.round(r.latency_ms) + ' ms';
    else if (r.tcp_tested && !r.available)
      tcpLine = '\n已尝试探测（失败，见上文说明）';
    const detail = (r.message || '') + tcpLine + '\n\n' + state + '\n请用左侧开关自行调整启用/禁用。';
    alert('「' + (r.name || '') + '」\n\n' + head + '\n' + detail);
  } catch (e) { toast(e.message, 'error'); }
}

/** 批量：仅检测已勾选的订阅；不可用且原为启用的订阅会自动禁用 */
async function batchCheckSubs() {
  const ids = getSelectedSubIds();
  if (!ids.length) { toast('请先勾选要检测的订阅', 'error'); return; }
  if (!confirm('将对选中的 ' + ids.length + ' 条订阅逐一检测。\n不可用且当前为「启用」的订阅将被自动禁用。\n确定继续？')) return;
  try {
    toast('正在批量检测，请稍候…');
    const r = await api('/api/subscriptions/batch-check', { method: 'POST', body: JSON.stringify({ ids }) });
    const n = r.auto_disabled || 0;
    toast('检测完成：共 ' + (r.checked || 0) + ' 条，已自动禁用 ' + n + ' 条');
    if (n > 0 && r.disabled_names && r.disabled_names.length)
      alert('已自动禁用的订阅：\n' + r.disabled_names.join('\n'));
    await loadSubs();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

async function toggleSubEnabled(id, enabled) {
  try {
    await api('/api/subscriptions/' + id, { method: 'PUT', body: JSON.stringify({ enabled }) });
    toast(enabled ? '已启用' : '已禁用');
    await loadSubs();
    schedulePreviewRefresh();
  } catch (e) {
    toast(e.message, 'error');
    await loadSubs();
  }
}

`;

function tplDescPreset(n) {
  const m = {'精简版':'基础分流, 7 个代理组','标准版':'常用服务分流, 14 个代理组','完整版':'全面精细分流, 33 个代理组'};
  return m[n] || '';
}

function tplStatPreset(n) {
  const g = {'精简版':'7','标准版':'14','完整版':'33'};
  return g[n] || '-';
}

function presetRowKeydown(ev, name) {
  if (!ev || (ev.key !== 'Enter' && ev.key !== ' ')) return;
  ev.preventDefault();
  selectTplPreset(name);
}

async function loadConfigPage() {
  await loadSettings();
  await renderConfigTemplates();
  await refreshPreview();
}

async function renderConfigTemplates() {
  try {
    const t = await api('/api/templates');
    document.getElementById('configPresetList').innerHTML = (t.presets || []).map(n => {
      const isActive = t.active === n;
      return `<div class="preset-row-config ${isActive ? 'is-active' : ''}">
        <div class="cursor-pointer rounded-lg p-1 -m-1" role="button" tabindex="0"
          onclick="selectTplPreset('${n}')" onkeydown='presetRowKeydown(event,${JSON.stringify(n)})'>
          <div class="flex justify-between gap-2">
            <div>
              <span class="font-semibold">${esc(n)}</span>
              ${isActive ? '<span class="tag bg-blue-600/20 text-blue-400 ml-2">当前</span>' : ''}
              <p class="text-sm text-slate-400 mt-1">${tplDescPreset(n)}</p>
            </div>
            <div class="text-xs text-slate-500 text-right shrink-0">${tplStatPreset(n)} 组</div>
          </div>
        </div>
        <div class="mt-3 flex justify-end">
          <button type="button" class="btn btn-secondary text-xs py-1.5 px-3" onclick='event.stopPropagation();previewPresetSkeleton(${JSON.stringify(n)})'>预览</button>
        </div>
      </div>`;
    }).join('');
    const list = document.getElementById('configCustomTplList');
    const items = t.custom_templates || [];
    if (!items.length) {
      list.innerHTML = '<div class="text-slate-500 text-sm py-2">暂无自定义模板。</div>';
    } else {
      list.innerHTML = items.map(c => {
        const isActive = t.active === 'custom:' + c.id;
        return `<div class="card flex flex-wrap items-center justify-between gap-2 py-2 ${isActive ? 'ring-1 ring-blue-500' : ''}">
          <div class="flex items-center gap-2 min-w-0">
            <span class="font-medium truncate">${esc(c.name)}</span>
            <span class="text-xs text-slate-500 shrink-0">#${c.id}</span>
            ${isActive ? '<span class="tag bg-blue-600/20 text-blue-400 shrink-0">当前</span>' : ''}
          </div>
          <div class="flex flex-wrap gap-1 shrink-0">
            <button type="button" class="btn btn-secondary btn-sm" onclick="selectTplCustom(${c.id})">选用</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="showTplItemModal(${c.id})">编辑</button>
            <button type="button" class="btn btn-danger btn-sm" onclick="deleteTplItem(${c.id})">删除</button>
          </div>
        </div>`;
      }).join('');
    }
  } catch (e) { toast(e.message, 'error'); }
}

/** 预设模板预览 YAML（无真实订阅、占位节点），可复制后到「创建模板」中修改 */
async function previewPresetSkeleton(name) {
  try {
    const r = await fetch(API + '/api/templates/preset-preview/' + encodeURIComponent(name), {
      headers: { Authorization: 'Bearer ' + TOKEN },
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      let msg = j.detail || r.statusText || '加载失败';
      if (Array.isArray(msg)) msg = msg.map(x => (x && x.msg) || String(x)).join('; ');
      throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
    }
    const d = await r.json();
    const yaml = d.yaml || '';
    const wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    wrap.id = 'presetSkelModal';
    wrap.addEventListener('click', (e) => { if (e.target === wrap) wrap.remove(); });
    const card = document.createElement('div');
    card.className = 'card w-full max-w-4xl max-h-[92vh] flex flex-col';
    card.addEventListener('click', (e) => e.stopPropagation());
    const title = document.createElement('div');
    title.className = 'flex flex-wrap items-center justify-between gap-2 mb-2';
    title.innerHTML = `<h3 class="text-lg font-bold">预设预览：${esc(name)}</h3>`;
    const close1 = document.createElement('button');
    close1.type = 'button';
    close1.className = 'btn btn-secondary btn-sm';
    close1.textContent = '关闭';
    close1.onclick = () => wrap.remove();
    title.appendChild(close1);
    const hint = document.createElement('p');
    hint.className = 'text-sm text-slate-400 mb-2';
    hint.textContent = '以下为无真实订阅时的示例 YAML（占位节点）。可复制全文，在「创建模板」中粘贴后按需修改。';
    const ta = document.createElement('textarea');
    ta.id = 'presetSkelTa';
    ta.readOnly = true;
    ta.className = 'font-mono text-xs w-full flex-1 min-h-[50vh] rounded-lg';
    ta.value = yaml;
    const bar = document.createElement('div');
    bar.className = 'flex flex-wrap gap-2 justify-end mt-3';
    const copyBtn = document.createElement('button');
    copyBtn.type = 'button';
    copyBtn.className = 'btn btn-primary btn-sm';
    copyBtn.textContent = '复制全部';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(ta.value).then(() => toast('已复制')).catch(() => toast('复制失败', 'error'));
    };
    const close2 = document.createElement('button');
    close2.type = 'button';
    close2.className = 'btn btn-secondary btn-sm';
    close2.textContent = '关闭';
    close2.onclick = () => wrap.remove();
    bar.appendChild(copyBtn);
    bar.appendChild(close2);
    card.appendChild(title);
    card.appendChild(hint);
    card.appendChild(ta);
    card.appendChild(bar);
    wrap.appendChild(card);
    document.body.appendChild(wrap);
  } catch (e) { toast(e.message, 'error'); }
}

async function selectTplPreset(name) {
  try {
    await api('/api/templates/select', { method: 'POST', body: JSON.stringify({ name }) });
    toast('已切换到: ' + name);
    await renderConfigTemplates();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

async function selectTplCustom(id) {
  try {
    await api('/api/templates/select', { method: 'POST', body: JSON.stringify({ custom_id: id }) });
    toast('已选用自定义模板');
    await renderConfigTemplates();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

async function showTplItemModal(id) {
  let name = '';
  let yaml = TPL_YAML_STUB;
  const isNew = id == null;
  if (!isNew) {
    try {
      const d = await api('/api/templates/custom-items/' + id);
      name = d.name || '';
      yaml = d.yaml || TPL_YAML_STUB;
    } catch (e) { toast(e.message, 'error'); return; }
  }
  const html = `<div class="modal-bg" id="tplItemModal" onclick="if(event.target===this)this.remove()">
    <div class="card w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <h3 class="text-lg font-bold mb-3">${isNew ? '创建' : '编辑'}自定义模板</h3>
      <div class="space-y-3">
        <div><label class="text-sm text-slate-400">模板名称</label><input id="m_tpl_name" placeholder="例如：办公用 / 游戏用"></div>
        <div><label class="text-sm text-slate-400">YAML（须含 proxy-groups）</label><textarea id="m_tpl_yaml" rows="18" class="font-mono text-sm"></textarea></div>
        <div class="flex gap-2 justify-end">
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('tplItemModal').remove()">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveTplItem(${isNew ? 'null' : id})">保存</button>
        </div>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('m_tpl_name').value = name;
  document.getElementById('m_tpl_yaml').value = yaml;
}

async function saveTplItem(id) {
  const name = document.getElementById('m_tpl_name').value.trim();
  const yaml = document.getElementById('m_tpl_yaml').value;
  if (!name) { toast('请填写模板名称', 'error'); return; }
  try {
    if (id == null) {
      await api('/api/templates/custom-items', { method: 'POST', body: JSON.stringify({ name, yaml }) });
    } else {
      await api('/api/templates/custom-items/' + id, { method: 'PUT', body: JSON.stringify({ name, yaml }) });
    }
    document.getElementById('tplItemModal')?.remove();
    toast('已保存');
    await renderConfigTemplates();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteTplItem(id) {
  if (!confirm('确定删除该自定义模板？')) return;
  try {
    await api('/api/templates/custom-items/' + id, { method: 'DELETE' });
    toast('已删除');
    await renderConfigTemplates();
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

async function loadSettings() {
  try {
    const s = await api('/api/settings');
    document.getElementById('s_include').value = s.include_types || '';
    document.getElementById('s_exclude').value = s.exclude_types || '';
    document.getElementById('s_keywords').value = s.exclude_keywords || '';
    document.getElementById('s_timeout').value = s.fetch_timeout || '15';
    document.getElementById('s_mihomo').value = s.mihomo_path || '';
    document.getElementById('s_autoExpiry').checked = s.auto_disable_on_expiry !== 'false';
    document.getElementById('s_autoEmpty').checked = s.auto_disable_on_empty !== 'false';
  } catch (e) { toast(e.message, 'error'); }
}

async function saveSettings() {
  try {
    await api('/api/settings', { method: 'PUT', body: JSON.stringify({
      include_types: document.getElementById('s_include').value,
      exclude_types: document.getElementById('s_exclude').value,
      exclude_keywords: document.getElementById('s_keywords').value,
      fetch_timeout: document.getElementById('s_timeout').value,
      mihomo_path: document.getElementById('s_mihomo').value,
      auto_disable_on_expiry: document.getElementById('s_autoExpiry').checked ? 'true' : 'false',
      auto_disable_on_empty: document.getElementById('s_autoEmpty').checked ? 'true' : 'false',
    })});
    toast('设置已保存');
    schedulePreviewRefresh();
  } catch (e) { toast(e.message, 'error'); }
}

/** 用 DOM 挂载 YAML，避免 innerHTML 解析高亮 HTML 时因特殊内容导致整块不显示 */
function mountYamlViewer(container, yaml) {
  const raw = yaml == null ? '' : String(yaml);
  container.replaceChildren();
  const lines = raw.split('\n');
  const gutter = document.createElement('div');
  gutter.className = 'yaml-gutter';
  gutter.textContent = lines.map((_, i) => String(i + 1)).join('\n');
  const pre = document.createElement('pre');
  pre.className = 'yaml-code';
  const code = document.createElement('code');
  code.textContent = raw;
  pre.appendChild(code);
  container.appendChild(gutter);
  container.appendChild(pre);
}

function setPreviewMode(mode) {
  _previewMode = mode;
  document.getElementById('pvBtnYaml').classList.toggle('active', mode === 'yaml');
  document.getElementById('pvBtnVis').classList.toggle('active', mode === 'visual');
  document.getElementById('configPreviewYamlWrap').classList.toggle('hidden', mode !== 'yaml');
  document.getElementById('configPreviewVisual').classList.toggle('hidden', mode !== 'visual');
  if (_lastPreview) applyPreviewToDom(_lastPreview);
}

function copyPreviewYaml() {
  const t = _lastPreview && _lastPreview.yaml != null ? String(_lastPreview.yaml) : '';
  if (!t) { toast('暂无 YAML，请先刷新预览', 'error'); return; }
  navigator.clipboard.writeText(t).then(() => toast('已复制 YAML')).catch(() => toast('复制失败', 'error'));
}

function applyPreviewToDom(d) {
  const yamlStr = d.yaml != null ? String(d.yaml) : '';
  document.getElementById('previewStats').textContent =
    `节点 ${d.proxy_count} · 代理组 ${d.group_count} · 规则集 ${d.rule_provider_count || 0}`;
  const yw = document.getElementById('configPreviewYaml');
  if (yw) mountYamlViewer(yw, yamlStr);
  const vis = document.getElementById('configPreviewVisual');
  if (!vis) return;
  const names = Array.isArray(d.proxy_names) ? d.proxy_names : [];
  const gnames = Array.isArray(d.group_names) ? d.group_names : [];
  vis.replaceChildren();
  vis.className = 'flex-1 min-h-0 overflow-hidden p-4 gap-4 text-sm flex flex-col md:flex-row';
  if (_previewMode !== 'visual') vis.classList.add('hidden');
  else vis.classList.remove('hidden');

  function buildCard(title, items) {
    const card = document.createElement('div');
    card.className = 'card flex flex-col flex-1 min-h-0 min-w-0';
    card.style.padding = '1rem';
    const h = document.createElement('h4');
    h.className = 'font-semibold mb-2 shrink-0';
    h.textContent = title + ' (' + items.length + ')';
    const ul = document.createElement('ul');
    ul.className = 'list-disc list-inside text-slate-400 space-y-1 overflow-y-auto flex-1 min-h-0 pr-1';
    items.forEach(n => {
      const li = document.createElement('li');
      li.textContent = n == null ? '' : String(n);
      ul.appendChild(li);
    });
    card.appendChild(h);
    card.appendChild(ul);
    return card;
  }

  vis.appendChild(buildCard('代理组', gnames));
  vis.appendChild(buildCard('节点', names));
}

async function refreshPreview() {
  const yw = document.getElementById('configPreviewYaml');
  if (!yw) return;
  yw.replaceChildren();
  const loading = document.createElement('div');
  loading.className = 'p-4 text-slate-400';
  loading.textContent = '加载中…';
  yw.appendChild(loading);
  try {
    const d = await api('/api/preview');
    _lastPreview = d;
    applyPreviewToDom(d);
    if (_previewMode === 'visual') {
      document.getElementById('configPreviewYamlWrap').classList.add('hidden');
      document.getElementById('configPreviewVisual').classList.remove('hidden');
    } else {
      document.getElementById('configPreviewYamlWrap').classList.remove('hidden');
      document.getElementById('configPreviewVisual').classList.add('hidden');
    }
  } catch (e) {
    yw.replaceChildren();
    const err = document.createElement('div');
    err.className = 'p-4 text-red-400';
    err.textContent = e.message || String(e);
    yw.appendChild(err);
  }
}

(async () => {
  if (TOKEN) {
    try { await api('/api/settings'); showMain(); }
    catch { doLogout(); }
  }
})();
</script>
</body>
</html>
