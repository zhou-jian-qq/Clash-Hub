{# 订阅管理 — Alpine.js 响应式版本 #}
<div id="page-subs" class="hidden" x-data="{
    get store() { return $store.subs; },

    /* ── 添加/编辑订阅弹窗 ── */
    subModal: false,
    subForm: { id: null, name: '', url: '', prefix: '', enabled: true, auto_disable: true },
    openAddSub() {
        this.subForm = { id: null, name: '', url: '', prefix: '', enabled: true, auto_disable: true };
        this.subModal = true;
        this.$nextTick(() => { const el = document.getElementById('mSubName'); if (el) el.focus(); });
    },
    openEditSub(s) {
        this.subForm = { id: s.id, name: s.name, url: s.url, prefix: s.prefix || '', enabled: s.enabled, auto_disable: s.auto_disable };
        this.subModal = true;
        this.$nextTick(() => { const el = document.getElementById('mSubName'); if (el) el.focus(); });
    },
    async saveSub() { await $store.subs.save(this.subForm); this.subModal = false; },

    /* ── 节点明细弹窗 ── */
    nodesModal: false,
    nodesModalTitle: '',
    async openNodes(s) {
        this.nodesModalTitle = '「' + s.name + '」节点明细';
        this.nodesModal = true;
        await $store.subs.loadNodes(s.id);
    },

    /* ── 检测结果弹窗 ── */
    resultModal: false,
    resultTitle: '',
    resultContent: '',
    showResult(title, content) {
        this.resultTitle = title;
        this.resultContent = content;
        this.resultModal = true;
    },
}" @keydown.escape.window="subModal = false; nodesModal = false; resultModal = false">

    <!-- 工具栏 -->
    <div class="mb-4 space-y-3">
        <h2 class="text-xl font-bold">订阅管理</h2>
        <div class="flex flex-wrap items-center justify-between gap-x-3 gap-y-3 pt-2 border-t border-slate-200/80 dark:border-slate-700/60">
            <div class="flex flex-wrap items-center gap-3 sm:gap-4">
                <label class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300 cursor-pointer select-none shrink-0"
                    title="勾选列表中的订阅">
                    <input type="checkbox"
                        class="rounded border-slate-500"
                        :checked="store.allSelected"
                        :indeterminate="store.someSelected"
                        @change="store.selectAll($event.target.checked)"> 全选
                </label>
                <button type="button" class="btn btn-outline-danger btn-sm" @click="store.batchDelete()"
                    title="删除已勾选的订阅">批量删除</button>
            </div>
            <div class="flex flex-wrap gap-2 items-center justify-start sm:justify-end w-full sm:w-auto">
                <button type="button" class="btn btn-ghost btn-sm" @click="store.refreshAll()">全部刷新</button>
                <button type="button" class="btn btn-outline-accent btn-sm" @click="store.batchCheck()"
                    title="仅检测列表已勾选的订阅；不可用且原为启用的将自动禁用">批量检测</button>
                <button type="button" class="btn btn-outline-warn btn-sm" @click="store.batchEnable(false)">批量禁用</button>
                <button type="button" class="btn btn-success btn-sm" @click="store.batchEnable(true)">批量启用</button>
                <button type="button" class="btn btn-primary btn-sm" @click="openAddSub()">添加订阅</button>
            </div>
        </div>
    </div>

    <!-- 列表 -->
    <div id="subsList">
        <template x-if="store.items.length === 0">
            <div class="card text-center text-slate-400 py-8">暂无订阅，点击添加订阅</div>
        </template>

        <template x-for="s in store.items" :key="s.id">
            <div class="card mb-3" :data-sub-id="s.id">
                <!-- 头部行：勾选、开关、名称、操作按钮 -->
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-2 gap-3">
                    <div class="flex items-center gap-2 min-w-0 flex-wrap">
                        <input type="checkbox" class="sub-cb rounded border-slate-500 shrink-0"
                            :checked="store.selectedIds.has(s.id)"
                            @change="store.toggleSelect(s.id, $event.target.checked)"
                            title="勾选后可批量启用/禁用/检测">
                        <label class="sub-switch mr-1" :title="s.enabled ? '点击禁用' : '点击启用'">
                            <input type="checkbox" role="switch" aria-label="启用订阅"
                                :checked="s.enabled"
                                @change="store.toggleEnabled(s.id, $event.target.checked)">
                            <span class="sub-switch-slider"></span>
                        </label>
                        <span class="tag" :class="s.enabled ? 'bg-green-600/20 text-green-400' : 'bg-red-600/20 text-red-400'"
                            x-text="s.enabled ? '启用' : '禁用'"></span>
                        <span class="font-semibold min-w-0 max-w-full break-words" x-text="s.name"></span>
                        <template x-if="s.prefix">
                            <span class="tag bg-blue-600/20 text-blue-400" x-text="s.prefix"></span>
                        </template>
                    </div>
                    <div class="flex flex-wrap gap-1 sm:justify-end">
                        <button type="button" class="btn btn-ghost btn-sm" @click="store.refresh(s.id)">刷新</button>
                        <button type="button" class="btn btn-outline-accent btn-sm" @click="store.check(s.id)"
                            title="检测：拉取+解析；单节点时额外 TCP 建连延迟">检测</button>
                        <button type="button" class="btn btn-outline-accent btn-sm" @click="openNodes(s)"
                            title="查看并测速订阅下的节点">节点明细</button>
                        <button type="button" class="btn btn-secondary btn-sm" @click="openEditSub(s)">编辑</button>
                        <button type="button" class="btn btn-danger btn-sm" @click="store.deleteItem(s.id)">删除</button>
                    </div>
                </div>
                <!-- 统计信息行 -->
                <div class="grid grid-cols-1 sm:flex sm:flex-wrap sm:items-center gap-1 sm:gap-4 text-sm text-slate-400 mb-2">
                    <span>节点: <span x-text="s.node_count"></span></span>
                    <span>已用: <span x-text="formatBytes(s.used)"></span> / <span x-text="formatBytes(s.total)"></span></span>
                    <span>到期: <span x-text="formatDate(s.expire)"></span></span>
                    <span>同步: <span x-text="formatIsoTime(s.last_sync)"></span></span>
                    <span>添加: <span x-text="formatIsoTime(s.created_at)"></span></span>
                    <span>更新: <span x-text="formatIsoTime(s.updated_at)"></span></span>
                </div>
                <!-- 流量进度条 -->
                <div class="progress-bar">
                    <div class="progress-fill" :style="`width:${s._pct}%;background:${s._color}`"></div>
                </div>
            </div>
        </template>
    </div>

    <!-- ── 添加/编辑订阅弹窗 ── -->
    <template x-if="subModal">
        <div class="modal-bg" @click.self="subModal = false">
            <div class="card w-full max-w-md max-h-[90vh] overflow-y-auto">
                <h3 class="text-lg font-bold mb-4" x-text="subForm.id ? '编辑订阅' : '添加订阅'"></h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-sm text-slate-400">名称</label>
                        <input id="mSubName" x-model="subForm.name">
                    </div>
                    <div>
                        <label class="text-sm text-slate-400">机场订阅链接</label>
                        <input x-model="subForm.url" placeholder="仅支持 https:// 或 http:// 订阅地址">
                    </div>
                    <div>
                        <label class="text-sm text-slate-400">前缀</label>
                        <input x-model="subForm.prefix" placeholder="可选, 用于区分来源">
                    </div>
                    <div class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" x-model="subForm.enabled"> 启用
                        </label>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" x-model="subForm.auto_disable"> 自动禁用
                        </label>
                    </div>
                    <div class="flex flex-col-reverse sm:flex-row gap-2 sm:justify-end">
                        <button type="button" class="btn btn-secondary" @click="subModal = false">取消</button>
                        <button type="button" class="btn btn-primary" @click="saveSub()"
                            x-text="subForm.id ? '保存' : '添加'"></button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ── 节点明细弹窗 ── -->
    <template x-if="nodesModal">
        <div class="modal-bg" @click.self="nodesModal = false; store.currentNodes = []">
            <div class="card w-full max-w-4xl max-h-[90vh] flex flex-col">
                <h3 class="text-lg font-bold mb-3 border-b border-slate-700/50 pb-2 flex flex-wrap items-center justify-between gap-2">
                    <span x-text="nodesModalTitle"></span>
                    <button type="button" class="btn btn-secondary btn-sm" @click="nodesModal = false; store.currentNodes = []">关闭</button>
                </h3>
                <!-- 加载中 -->
                <template x-if="store.nodesLoading">
                    <div class="flex-1 p-8 text-center text-slate-400">正在实时拉取并解析节点配置，请稍候...</div>
                </template>
                <!-- 无节点 -->
                <template x-if="!store.nodesLoading && store.currentNodes.length === 0">
                    <div class="flex-1 p-8 text-center text-slate-400">未解析到任何有效节点</div>
                </template>
                <!-- 节点列表 -->
                <template x-if="!store.nodesLoading && store.currentNodes.length > 0">
                    <div class="flex-1 overflow-y-auto">
                        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-3">
                            <span class="text-sm text-slate-400">共解析到 <span x-text="store.currentNodes.length"></span> 个节点（关闭弹窗后状态将不被保留）</span>
                            <button type="button" class="btn btn-outline-accent btn-sm" @click="store.batchCheckNodes()">批量测速</button>
                        </div>
                        <div class="border border-slate-700/50 rounded-lg overflow-hidden">
                            <template x-for="(n, i) in store.currentNodes" :key="i">
                                <div class="flex flex-wrap items-center gap-2 sm:gap-3 p-3 border-b border-slate-700/50 last:border-0 hover:bg-slate-800/30 transition-colors">
                                    <span class="text-xs text-slate-500 w-6 text-right" x-text="i + 1"></span>
                                    <span class="font-medium min-w-0 flex-1 basis-[12rem] truncate md:max-w-md" :title="n.name" x-text="n.name"></span>
                                    <span class="tag bg-slate-600/50 text-xs shrink-0" x-text="n.type"></span>
                                    <!-- 延迟状态 -->
                                    <span class="inline-flex items-center gap-1 text-xs sm:ml-auto">
                                        <template x-if="n._checking">
                                            <span class="inline-flex items-center gap-1">
                                                <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                                                <span class="text-slate-400">测速中...</span>
                                            </span>
                                        </template>
                                        <template x-if="!n._checking && n._available === null">
                                            <span class="inline-flex items-center gap-1 text-slate-400">
                                                <span class="w-2 h-2 rounded-full bg-slate-500"></span>
                                                <span>-</span>
                                            </span>
                                        </template>
                                        <template x-if="!n._checking && n._available === true">
                                            <span class="inline-flex items-center gap-1">
                                                <span class="w-2 h-2 rounded-full"
                                                    :class="n._latencyMs <= 200 ? 'bg-green-500' : n._latencyMs <= 500 ? 'bg-yellow-400' : 'bg-red-500'"></span>
                                                <span :class="n._latencyMs <= 200 ? 'text-green-500' : n._latencyMs <= 500 ? 'text-yellow-400' : 'text-red-500'"
                                                    x-text="Math.round(n._latencyMs) + ' ms'"></span>
                                            </span>
                                        </template>
                                        <template x-if="!n._checking && n._available === false">
                                            <span class="inline-flex items-center gap-1 text-red-500">
                                                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                                                <span>失败</span>
                                            </span>
                                        </template>
                                    </span>
                                    <button type="button" class="btn btn-outline-accent btn-sm ml-2" @click="store.checkNode(i)">测速</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- ── 检测结果弹窗 ── -->
    <template x-if="resultModal">
        <div class="modal-bg" @click.self="resultModal = false">
            <div class="card w-full max-w-md max-h-[90vh] overflow-y-auto">
                <h3 class="text-lg font-bold mb-4 border-b border-slate-700/50 pb-2" x-text="resultTitle"></h3>
                <div class="text-sm text-slate-300 mb-6 leading-relaxed" style="white-space: pre-wrap" x-text="resultContent"></div>
                <div class="flex justify-end">
                    <button type="button" class="btn btn-primary px-6" @click="resultModal = false">确定</button>
                </div>
            </div>
        </div>
    </template>

</div>
