{# 订阅管理：标题单独一行；第二行为全选 + 批量操作 #subsList #}
                    <div id="page-subs" class="hidden">
                        <div class="mb-4 space-y-3">
                            <h2 class="text-xl font-bold">订阅管理</h2>
                            <div
                                class="flex flex-wrap items-center justify-between gap-x-3 gap-y-3 pt-2 border-t border-slate-200/80 dark:border-slate-700/60">
                                <div class="flex flex-wrap items-center gap-3 sm:gap-4">
                                    <label
                                        class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300 cursor-pointer select-none shrink-0"
                                        title="勾选列表中的订阅">
                                        <input type="checkbox" id="subSelectAll" class="rounded border-slate-500"
                                            onchange="toggleSelectAllSubs(this.checked)"> 全选
                                    </label>
                                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="batchDeleteSubs()"
                                        title="删除已勾选的订阅">批量删除</button>
                                </div>
                                <div class="flex flex-wrap gap-2 items-center justify-start sm:justify-end w-full sm:w-auto">
                                    <button type="button" class="btn btn-ghost btn-sm"
                                        onclick="refreshAllSubs()">全部刷新</button>
                                    <button type="button" class="btn btn-outline-accent btn-sm" onclick="batchCheckSubs()"
                                        title="仅检测列表已勾选的订阅；不可用且原为启用的将自动禁用">批量检测</button>
                                    <button type="button" class="btn btn-outline-warn btn-sm"
                                        onclick="batchEnableSubs(false)">批量禁用</button>
                                    <button type="button" class="btn btn-success btn-sm"
                                        onclick="batchEnableSubs(true)">批量启用</button>
                                    <button type="button" class="btn btn-primary btn-sm" onclick="showAddSub()">添加订阅</button>
                                </div>
                            </div>
                        </div>
                        <div id="subsList"></div>
                    </div>
