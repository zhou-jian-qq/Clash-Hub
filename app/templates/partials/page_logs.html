{# 订阅访问日志 — Alpine.js 响应式版本 #}
<div id="page-logs" class="hidden" x-data="{
    get L() { return $store.logs; },
}">

    <div class="mb-4 space-y-3">
        <h2 class="text-xl font-bold">访问日志</h2>
        <div class="flex flex-wrap items-center justify-between gap-x-3 gap-y-3 pt-2 border-t border-slate-200/80 dark:border-slate-700/60">
            <p class="text-sm text-slate-500 dark:text-slate-400">记录每次客户端拉取订阅链接的 IP 和客户端信息</p>
            <button type="button" class="btn btn-outline-danger btn-sm" @click="L.clearLogs()">清空日志</button>
        </div>
    </div>

    <!-- 过滤工具栏 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:flex lg:flex-wrap lg:items-end gap-3 py-3 border-t border-slate-200/80 dark:border-slate-700/60">
        <div class="flex flex-col gap-1 min-w-0">
            <label class="text-xs" style="color:var(--muted)">开始日期</label>
            <input type="date" x-model="L.filter.date_from"
                style="width:100%; min-width:0; cursor:pointer"
                @click="$event.target.showPicker && $event.target.showPicker()">
        </div>
        <div class="flex flex-col gap-1 min-w-0">
            <label class="text-xs" style="color:var(--muted)">结束日期</label>
            <input type="date" x-model="L.filter.date_to"
                style="width:100%; min-width:0; cursor:pointer"
                @click="$event.target.showPicker && $event.target.showPicker()">
        </div>
        <div class="flex flex-col gap-1 min-w-0">
            <label class="text-xs" style="color:var(--muted)">IP 地址</label>
            <input type="text" x-model="L.filter.ip" placeholder="输入 IP 地址"
                @keydown.enter="L.applyFilter()"
                style="width:100%">
        </div>
        <div class="flex gap-2 sm:col-span-2 lg:col-span-1" style="padding-bottom:0.65rem">
            <button type="button" class="btn btn-primary btn-sm" @click="L.applyFilter()">查询</button>
            <button type="button" class="btn btn-ghost btn-sm" @click="L.resetFilter()">重置</button>
        </div>
    </div>

    <!-- 日志表格 -->
    <div class="overflow-x-auto rounded-lg border border-slate-200 dark:border-slate-700">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-slate-50 dark:bg-slate-800 text-left text-slate-600 dark:text-slate-300">
                    <th class="px-4 py-2 font-medium whitespace-nowrap">#</th>
                    <th class="px-4 py-2 font-medium whitespace-nowrap">时间</th>
                    <th class="px-4 py-2 font-medium whitespace-nowrap">客户端 IP
                        <span class="text-xs font-normal text-slate-400">(优先反代 X-Forwarded-For / X-Real-IP，无则直连)</span>
                    </th>
                    <th class="px-4 py-2 font-medium">客户端 / User-Agent</th>
                </tr>
            </thead>
            <tbody>
                <!-- 加载中 -->
                <template x-if="L.items.length === 0">
                    <tr>
                        <td colspan="4" class="px-4 py-6 text-center text-slate-400 dark:text-slate-500">加载中…</td>
                    </tr>
                </template>
                <!-- 日志行 -->
                <template x-for="(item, idx) in L.items" :key="item.id || idx">
                    <tr class="border-t border-slate-100 dark:border-slate-700/60 hover:bg-slate-50 dark:hover:bg-slate-800/40">
                        <td class="px-4 py-2 text-slate-400 text-xs" x-text="(L.page - 1) * L.pageSize + idx + 1"></td>
                        <td class="px-4 py-2 whitespace-nowrap text-xs" x-text="formatIsoTime(item.accessed_at)"></td>
                        <td class="px-4 py-2 whitespace-nowrap text-xs">
                            <span class="font-mono text-xs"
                                :class="item.real_ip ? 'text-emerald-600 dark:text-emerald-400' : ''"
                                x-text="item.display_ip || item.real_ip || item.ip || '-'"></span>
                        </td>
                        <td class="px-4 py-2 text-xs">
                            <template x-if="L.parseClient(item.user_agent || '')">
                                <span class="inline-block px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 text-xs font-medium mr-1"
                                    x-text="L.parseClient(item.user_agent || '')"></span>
                            </template>
                            <span class="text-slate-400 dark:text-slate-500"
                                :title="item.user_agent || ''"
                                x-text="(item.user_agent || '').length > 80 ? (item.user_agent || '').slice(0, 80) + '…' : (item.user_agent || '—')"></span>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <div class="mt-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 text-sm text-slate-500 dark:text-slate-400">
        <span x-text="'共 ' + L.total + ' 条记录'"></span>
        <div class="flex gap-2">
            <button type="button" class="btn btn-ghost btn-sm"
                :disabled="L.page <= 1"
                @click="L.load(L.page - 1)">上一页</button>
            <span class="self-center" x-text="L.page + ' / ' + L.totalPages"></span>
            <button type="button" class="btn btn-ghost btn-sm"
                :disabled="L.page >= L.totalPages"
                @click="L.load(L.page + 1)">下一页</button>
        </div>
    </div>

</div>
