{# 日志页：3 子 Tab — 访问日志 / 操作日志 / 探测历史 #}
<div id="page-logs" class="hidden" x-data="{
    get store() { return $store.logs; },
}">

    <h2 class="text-xl font-bold mb-5">日志</h2>

    <!-- 子 Tab -->
    <div class="page-tabs">
        <button type="button" class="page-tab" :class="store.activeTab==='access' && 'active'"
            @click="store.activeTab='access'; store.load(1)">
            <i data-lucide="globe" class="w-3.5 h-3.5 mr-1 inline-block align-text-top"></i>访问日志
        </button>
        <button type="button" class="page-tab" :class="store.activeTab==='audit' && 'active'"
            @click="store.activeTab='audit'; store.loadAudit(1)">
            <i data-lucide="clipboard-list" class="w-3.5 h-3.5 mr-1 inline-block align-text-top"></i>操作日志
        </button>
        <button type="button" class="page-tab" :class="store.activeTab==='probe' && 'active'"
            @click="store.activeTab='probe'">
            <i data-lucide="activity" class="w-3.5 h-3.5 mr-1 inline-block align-text-top"></i>探测历史
        </button>
    </div>

    <!-- ═══ Tab: 访问日志 ═══ -->
    <div x-show="store.activeTab==='access'">
        <!-- 筛选栏 -->
        <div class="card mb-4 p-4">
            <div class="grid sm:grid-cols-3 gap-3">
                <input x-model="store.filter.ip" placeholder="IP 地址筛选" @keydown.enter="store.applyFilter()">
                <input type="date" x-model="store.filter.date_from" title="开始日期">
                <input type="date" x-model="store.filter.date_to" title="结束日期">
            </div>
            <div class="flex flex-wrap gap-2 mt-3 justify-end">
                <button type="button" class="btn btn-ghost btn-sm" @click="store.resetFilter()">重置</button>
                <button type="button" class="btn btn-outline-accent btn-sm" @click="store.applyFilter()">筛选</button>
                <button type="button" class="btn btn-outline-danger btn-sm" @click="store.clearLogs()">清空日志</button>
            </div>
        </div>

        <!-- 列表 -->
        <template x-if="store.items.length === 0">
            <div class="card">
                <div class="empty-state">
                    <i data-lucide="globe" class="w-10 h-10"></i>
                    <p>暂无访问日志</p>
                </div>
            </div>
        </template>

        <template x-if="store.items.length > 0">
            <div class="card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b text-left" style="border-color:var(--border)">
                                <th class="px-4 py-2.5 font-medium" style="color:var(--muted)">时间</th>
                                <th class="px-4 py-2.5 font-medium" style="color:var(--muted)">IP</th>
                                <th class="px-4 py-2.5 font-medium" style="color:var(--muted)">客户端</th>
                                <th class="px-4 py-2.5 font-medium" style="color:var(--muted)">路径</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="item in store.items" :key="item.id">
                                <tr class="border-b last:border-0 hover:bg-opacity-50 transition-colors" style="border-color:var(--border)">
                                    <td class="px-4 py-2 font-mono text-xs whitespace-nowrap" style="color:var(--muted)" x-text="formatIsoTime(item.accessed_at)"></td>
                                    <td class="px-4 py-2 font-mono text-xs whitespace-nowrap" x-text="item.client_ip || '-'"></td>
                                    <td class="px-4 py-2 text-xs max-w-xs truncate">
                                        <template x-if="store.parseClient && store.parseClient(item.user_agent)">
                                            <span class="chip" x-text="store.parseClient(item.user_agent)"></span>
                                        </template>
                                        <template x-if="!store.parseClient || !store.parseClient(item.user_agent)">
                                            <span style="color:var(--muted)" x-text="(item.user_agent || '-').substring(0, 40)"></span>
                                        </template>
                                    </td>
                                    <td class="px-4 py-2 font-mono text-xs max-w-xs truncate" style="color:var(--muted)" x-text="item.path || ''"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <!-- 分页 -->
                <div class="flex items-center justify-between px-4 py-3 border-t text-sm" style="border-color:var(--border);color:var(--muted)">
                    <span>共 <span x-text="store.total"></span> 条</span>
                    <div class="flex gap-1">
                        <button type="button" class="btn btn-ghost btn-sm"
                            :disabled="store.page <= 1"
                            @click="store.load(store.page - 1)">&lt;</button>
                        <span class="px-2 py-1.5 text-xs">第 <span x-text="store.page"></span> / <span x-text="store.totalPages"></span> 页</span>
                        <button type="button" class="btn btn-ghost btn-sm"
                            :disabled="store.page >= store.totalPages"
                            @click="store.load(store.page + 1)">&gt;</button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- ═══ Tab: 操作日志 ═══ -->
    <div x-show="store.activeTab==='audit'">
        <div class="flex justify-end mb-4">
            <button type="button" class="btn btn-outline-danger btn-sm" @click="store.clearAudit()">
                <i data-lucide="trash-2" class="w-3.5 h-3.5 mr-1"></i>清空操作日志
            </button>
        </div>

        <template x-if="store.auditItems.length === 0">
            <div class="card">
                <div class="empty-state">
                    <i data-lucide="clipboard-list" class="w-10 h-10"></i>
                    <p>暂无操作日志</p>
                </div>
            </div>
        </template>

        <template x-if="store.auditItems.length > 0">
            <div class="card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b text-left" style="border-color:var(--border)">
                                <th class="px-4 py-2.5 font-medium" style="color:var(--muted)">时间</th>
                                <th class="px-4 py-2.5 font-medium" style="color:var(--muted)">操作</th>
                                <th class="px-4 py-2.5 font-medium" style="color:var(--muted)">路径</th>
                                <th class="px-4 py-2.5 font-medium" style="color:var(--muted)">IP</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="item in store.auditItems" :key="item.id">
                                <tr class="border-b last:border-0 hover:bg-opacity-50 transition-colors" style="border-color:var(--border)">
                                    <td class="px-4 py-2 font-mono text-xs whitespace-nowrap" style="color:var(--muted)" x-text="formatIsoTime(item.created_at)"></td>
                                    <td class="px-4 py-2 text-xs">
                                        <span class="chip" x-text="item.action || item.method || '-'"></span>
                                    </td>
                                    <td class="px-4 py-2 font-mono text-xs max-w-xs truncate" x-text="item.path || '-'"></td>
                                    <td class="px-4 py-2 font-mono text-xs whitespace-nowrap" style="color:var(--muted)" x-text="item.ip || '-'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <!-- 分页 -->
                <div class="flex items-center justify-between px-4 py-3 border-t text-sm" style="border-color:var(--border);color:var(--muted)">
                    <span>共 <span x-text="store.auditTotal"></span> 条</span>
                    <div class="flex gap-1">
                        <button type="button" class="btn btn-ghost btn-sm"
                            :disabled="store.auditPage <= 1"
                            @click="store.loadAudit(store.auditPage - 1)">&lt;</button>
                        <span class="px-2 py-1.5 text-xs">第 <span x-text="store.auditPage"></span> / <span x-text="store.auditTotalPages"></span> 页</span>
                        <button type="button" class="btn btn-ghost btn-sm"
                            :disabled="store.auditPage >= store.auditTotalPages"
                            @click="store.loadAudit(store.auditPage + 1)">&gt;</button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- ═══ Tab: 探测历史 ═══ -->
    <div x-show="store.activeTab==='probe'" x-data="{
        targetType: 'sub',
        targetId: '',
        days: 7,
        records: [],
        loading: false,
        allSubs: [],
        allNodes: [],

        async initTargets() {
            try {
                this.allSubs = await api('/api/subscriptions');
            } catch (_) {}
            try {
                const batches = await api('/api/import-batches');
                this.allNodes = batches.flatMap(b => (b.nodes||[]).map(n => ({...n, batchName: b.name})));
            } catch (_) {}
        },
        async loadHistory() {
            if (!this.targetId) { toast('请先选择目标', 'error'); return; }
            const target = this.targetType + ':' + this.targetId;
            this.loading = true;
            this.records = [];
            try {
                const r = await api('/api/probe-history?target=' + encodeURIComponent(target) + '&days=' + this.days);
                this.records = r.records || [];
            } catch (e) { toast(e.message, 'error'); }
            finally {
                this.loading = false;
                this.$nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
            }
        },
        get successCount() { return this.records.filter(r => r.available).length; },
        get failCount() { return this.records.filter(r => !r.available).length; },
        get avgLatency() {
            const valid = this.records.filter(r => r.available && r.latency_ms != null);
            if (!valid.length) return null;
            return Math.round(valid.reduce((s,r) => s + r.latency_ms, 0) / valid.length);
        },
        sparklinePath() {
            if (this.records.length < 2) return '';
            const W = 600, H = 80, pad = 8;
            const latencies = this.records.map(r => r.available && r.latency_ms != null ? r.latency_ms : null);
            const vals = latencies.filter(v => v != null);
            if (!vals.length) return '';
            const maxV = Math.max(...vals, 1);
            const minV = Math.min(...vals);
            const n = this.records.length;
            const pts = this.records.map((r, i) => {
                const x = pad + (W - 2 * pad) * i / (n - 1);
                const lat = r.available && r.latency_ms != null ? r.latency_ms : null;
                const y = lat != null ? pad + (H - 2 * pad) * (1 - (lat - minV) / (maxV - minV || 1)) : H / 2;
                return [x, y];
            });
            const filtered = pts.filter((_, i) => this.records[i].latency_ms != null);
            if (filtered.length < 2) return '';
            return filtered.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
        },
    }" x-init="initTargets()">
        <div class="grid lg:grid-cols-[280px,1fr] gap-5">
            <!-- 左侧选择器 -->
            <div class="space-y-4">
                <div class="card">
                    <div class="section-title">目标选择</div>
                    <div class="space-y-3">
                        <div class="flex gap-2">
                            <button type="button" class="flex-1 btn btn-sm"
                                :class="targetType==='sub' ? 'btn-primary' : 'btn-ghost'"
                                @click="targetType='sub'; targetId=''">订阅</button>
                            <button type="button" class="flex-1 btn btn-sm"
                                :class="targetType==='node' ? 'btn-primary' : 'btn-ghost'"
                                @click="targetType='node'; targetId=''">节点</button>
                        </div>
                        <template x-if="targetType==='sub'">
                            <select x-model="targetId">
                                <option value="">-- 选择订阅 --</option>
                                <template x-for="s in allSubs" :key="s.id">
                                    <option :value="s.id" x-text="s.name"></option>
                                </template>
                            </select>
                        </template>
                        <template x-if="targetType==='node'">
                            <select x-model="targetId">
                                <option value="">-- 选择节点 --</option>
                                <template x-for="n in allNodes" :key="n.id">
                                    <option :value="n.id" x-text="(n.batchName ? n.batchName + ' / ' : '') + n.display_name"></option>
                                </template>
                            </select>
                        </template>
                        <div>
                            <label class="text-xs mb-1 block" style="color:var(--muted)">时间范围</label>
                            <div class="flex flex-wrap gap-1.5">
                                <template x-for="d in [1,3,7,14,30]" :key="d">
                                    <button type="button" class="btn btn-sm text-xs px-2.5"
                                        :class="days===d ? 'btn-primary' : 'btn-ghost'"
                                        @click="days=d" x-text="d + ' 天'"></button>
                                </template>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary w-full"
                            :disabled="!targetId || loading"
                            @click="loadHistory()">
                            <span x-show="!loading">查看历史</span>
                            <span x-show="loading" class="flex items-center justify-center gap-1.5">
                                <span class="sse-spinner"></span>加载中
                            </span>
                        </button>
                    </div>
                </div>

                <!-- 统计摘要 -->
                <template x-if="records.length > 0">
                    <div class="card">
                        <div class="section-title">统计摘要</div>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span style="color:var(--muted)">探测次数</span>
                                <span x-text="records.length"></span>
                            </div>
                            <div class="flex justify-between">
                                <span style="color:var(--muted)">成功</span>
                                <span class="text-green-400" x-text="successCount"></span>
                            </div>
                            <div class="flex justify-between">
                                <span style="color:var(--muted)">失败</span>
                                <span class="text-red-400" x-text="failCount"></span>
                            </div>
                            <div class="flex justify-between">
                                <span style="color:var(--muted)">平均延迟</span>
                                <span x-text="avgLatency != null ? avgLatency + ' ms' : '-'"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- 右侧图表+记录 -->
            <div>
                <template x-if="records.length === 0 && !loading">
                    <div class="card">
                        <div class="empty-state">
                            <i data-lucide="activity" class="w-10 h-10"></i>
                            <p>选择目标后点击「查看历史」</p>
                        </div>
                    </div>
                </template>

                <template x-if="records.length > 0">
                    <div class="space-y-4">
                        <!-- Sparkline 图 -->
                        <div class="card">
                            <div class="section-title mb-3">延迟折线图</div>
                            <svg viewBox="0 0 600 80" class="sparkline-svg w-full" style="height:90px">
                                <!-- 背景格线 -->
                                <line x1="8" y1="40" x2="592" y2="40" stroke="var(--border)" stroke-width="0.5"></line>
                                <!-- 折线 -->
                                <template x-if="sparklinePath()">
                                    <path :d="sparklinePath()" class="spark-line"></path>
                                </template>
                                <!-- 数据点 -->
                                <template x-for="(r, i) in records" :key="i">
                                    <circle
                                        :cx="8 + (600 - 16) * i / (records.length - 1)"
                                        :cy="r.available && r.latency_ms != null ? (8 + 64 * (1 - Math.min(r.latency_ms, 2000) / 2000)) : 40"
                                        r="3"
                                        :class="r.available ? 'spark-dot-ok' : 'spark-dot-fail'">
                                        <title x-text="formatIsoTime(r.probed_at) + ' — ' + (r.available ? (r.latency_ms != null ? Math.round(r.latency_ms) + ' ms' : 'OK') : '失败')"></title>
                                    </circle>
                                </template>
                            </svg>
                        </div>
                        <!-- 记录列表（最近 50 条） -->
                        <div class="card p-0 overflow-hidden">
                            <div class="px-4 py-2.5 border-b text-xs font-medium" style="border-color:var(--border);color:var(--muted)">
                                最近 <span x-text="Math.min(records.length, 50)"></span> 条探测记录
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-xs">
                                    <thead>
                                        <tr class="border-b text-left" style="border-color:var(--border)">
                                            <th class="px-4 py-2 font-medium" style="color:var(--muted)">时间</th>
                                            <th class="px-4 py-2 font-medium" style="color:var(--muted)">结果</th>
                                            <th class="px-4 py-2 font-medium" style="color:var(--muted)">延迟</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(r, i) in records.slice(0, 50)" :key="i">
                                            <tr class="border-b last:border-0" style="border-color:var(--border)">
                                                <td class="px-4 py-1.5 font-mono whitespace-nowrap" style="color:var(--muted)" x-text="formatIsoTime(r.probed_at)"></td>
                                                <td class="px-4 py-1.5">
                                                    <span :class="r.available ? 'text-green-400' : 'text-red-400'"
                                                        x-text="r.available ? '成功' : '失败'"></span>
                                                </td>
                                                <td class="px-4 py-1.5 font-mono">
                                                    <span x-html="r.latency_ms != null ? renderLatencyBar(r.latency_ms, true) : '<span style=\'color:var(--muted)\'>-</span>'"></span>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

</div>
