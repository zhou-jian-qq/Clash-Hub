{# Clash Hub — 单页骨架：head、静态 CSS/JS 加载顺序；正文由子模板或 index 的 block 填充 #}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <!-- Phase 4.1：防闪烁预读脚本 — 必须在所有样式表之前执行 -->
    <script>
        (function() {
            var saved = localStorage.getItem('ch_theme');
            var theme = saved === 'light' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/favicon.svg">
    <title>Clash Hub</title>
    <!-- 引入 Inter 字体 (使用国内 loli.net 镜像加速) -->
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- 引入 Lucide 图标库 (使用 jsdelivr fastly 国内加速节点) -->
    <script src="https://fastly.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- 引入 Tailwind CSS (使用 jsdelivr fastly 国内加速节点) -->
    <script src="https://fastly.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
    <link rel="stylesheet" href="/static/css/theme.css?v=4">
    <link rel="stylesheet" href="/static/css/layout.css?v=5">
    <link rel="stylesheet" href="/static/css/components.css?v=5">
    <!-- Alpine.js：defer 保证在 DOM 解析完毕后初始化，store/组件注册须在此脚本之前完成 -->
    <script defer src="https://fastly.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>

<body>
{% block body %}{% endblock %}
    <!-- Prism：YAML 语法高亮（先于业务脚本，供 page-config mountYamlViewer 使用，已替换为国内静态资源 CDN） -->
    <script src="https://fastly.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
    <!-- 脚本加载顺序：
         1. core.js        — 工具函数（api/toast/esc/safeHtml/...）
         2. alpine/store   — Alpine store & 组件注册（必须在 Alpine defer 脚本执行前完成）
         3. 各页业务逻辑  — page-*.js（store action 实现）
         4. app.js         — Tab 路由、popstate
         Alpine 的 defer 脚本会在所有同步脚本执行完毕后、DOMContentLoaded 前启动。
    -->
    <script src="/static/js/core.js?v=4"></script>
    <script src="/static/js/alpine/store.js?v=5"></script>
    <script src="/static/js/alpine/components.js?v=1"></script>
    <script src="/static/js/page-home.js?v=5"></script>
    <script src="/static/js/page-subs.js?v=4"></script>
    <script src="/static/js/page-imports.js?v=4"></script>
    <script src="/static/js/page-config.js?v=4"></script>
    <script src="/static/js/page-profiles.js?v=4"></script>
    <script src="/static/js/page-templates.js?v=4"></script>
    <script src="/static/js/page-settings.js?v=4"></script>
    <script src="/static/js/page-logs.js?v=5"></script>
    <script src="/static/js/app.js?v=4"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
