{# Clash Hub — 单页骨架：head、静态 CSS/JS 加载顺序；正文由子模板或 index 的 block 填充 #}
<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/favicon.svg">
    <title>Clash Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>

<body>
{% block body %}{% endblock %}
    <!-- 脚本加载顺序：core → 各页逻辑 → app（路由与 token 引导）；非 module，全局函数供 HTML onclick 使用 -->
    <script src="/static/js/core.js"></script>
    <script src="/static/js/page-home.js"></script>
    <script src="/static/js/page-subs.js"></script>
    <script src="/static/js/page-imports.js"></script>
    <script src="/static/js/page-config.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
